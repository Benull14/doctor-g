services:
  postgres:
    image: postgres:16-alpine
    container_name: doctor-g-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doctor_g
    ports:
      - "5433:5432"
    volumes:
      - doctor_g_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctor_g"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  doctor_g_pgdata:
